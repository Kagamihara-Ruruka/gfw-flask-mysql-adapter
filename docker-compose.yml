services:
  mysql:
    image: mysql:8.4
    container_name: gfw_adapter_mysql
    environment:
      MYSQL_ROOT_PASSWORD: fishery123
      MYSQL_DATABASE: ocean_fishery
    ports:
      - "3307:3306"
    command:
      - --local-infile=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
