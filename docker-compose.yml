services:
  mysql:
    image: mysql:8.4
    container_name: common_adapter_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
      MYSQL_DATABASE: common_fishery
    ports:
      - "3307:3306"
    command:
      - --local-infile=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - type: bind
        source: "${MYSQL_DATA_PATH:?Set MYSQL_DATA_PATH in .env}"
        target: /var/lib/mysql

  postgis:
    image: postgis/postgis:16-3.4
    container_name: common_adapter_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${EEZ_POSTGRES_PASSWORD:?Set EEZ_POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: common_spatial
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:
