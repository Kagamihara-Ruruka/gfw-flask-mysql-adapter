services:
  mysql:
    image: mysql:8.4
    container_name: common_adapter_mysql
    environment:
      MYSQL_ROOT_PASSWORD: fishery123
      MYSQL_DATABASE: common_fishery
    ports:
      - "3307:3306"
    command:
      - --local-infile=1
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - type: bind
        source: D:/RRKAL_tools/gfw_mysql_data
        target: /var/lib/mysql

  postgis:
    image: postgis/postgis:16-3.4
    container_name: common_adapter_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: spatial123
      POSTGRES_DB: common_spatial
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:
