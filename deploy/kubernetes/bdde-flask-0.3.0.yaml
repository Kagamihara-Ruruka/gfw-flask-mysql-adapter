apiVersion: apps/v1
kind: Deployment
metadata:
  name: bdde-flask
  namespace: dt
  labels:
    app: bdde-flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bdde-flask
  template:
    metadata:
      labels:
        app: bdde-flask
    spec:
      imagePullSecrets:
        - name: dkreg
      runtimeClassName: gvisor
      nodeSelector:
        dt: worker
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: bdde-flask
          image: dkreg.taroko:5000/bdde-flask:0.3.0
          imagePullPolicy: Always
          command: ["python"]
          args:
            - adapter.py
            - --config
            - /app/config/runtime/adapter.local.json
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --no-developer-server
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: POSTGIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bdde-postgis-secret
                  key: password
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bdde-ais-secret
                  key: api-key
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bdde-flask-config
              mountPath: /app/config
              readOnly: true
            - name: eez-cache
              mountPath: /app/data/eez
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
      volumes:
        - name: bdde-flask-config
          configMap:
            name: bdde-flask-config
            items:
              - key: adapter.local.json
                path: runtime/adapter.local.json
              - key: spark_thrift.local.json
                path: sources/database/spark_thrift.local.json
              - key: eez.local.json
                path: sources/spatial/eez.local.json
              - key: router_manifest.local.json
                path: state/router_manifest.local.json
              - key: layer_mappings.local.json
                path: artifacts/layer_mappings.local.json
        - name: eez-cache
          persistentVolumeClaim:
            claimName: bdde-eez-cache
---
apiVersion: v1
kind: Service
metadata:
  name: bdde-flask-service
  namespace: dt
  labels:
    app: bdde-flask
spec:
  type: NodePort
  selector:
    app: bdde-flask
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 32080
      protocol: TCP
